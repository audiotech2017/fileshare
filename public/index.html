<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileShare - Share Files via QR Code</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .upload-area {
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border-bottom: 1px solid #eee;
    }

    .upload-area:hover {
      background: #f8f9ff;
    }

    .upload-area.dragover {
      background: #f0f3ff;
      border-color: #667eea;
    }

    .upload-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }

    .upload-text {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 8px;
    }

    .upload-hint {
      font-size: 0.9rem;
      color: #888;
    }

    #fileInput {
      display: none;
    }

    .result-area {
      padding: 30px;
      display: none;
    }

    .result-area.active {
      display: block;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: #f8f9ff;
      border-radius: 10px;
      margin-bottom: 25px;
    }

    .file-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    .file-details {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
    }

    .qr-section {
      text-align: center;
    }

    .qr-title {
      font-size: 1rem;
      color: #333;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .qr-code {
      background: white;
      padding: 15px;
      border-radius: 12px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .qr-code img {
      width: 200px;
      height: 200px;
    }

    .download-btn {
      display: block;
      width: 100%;
      padding: 14px 24px;
      margin-top: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      text-align: center;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .copy-section {
      margin-top: 15px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .copy-btn:hover {
      background: #e0e0e0;
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
      fill: #666;
    }

    .expires-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #fff3e0;
      color: #e65100;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-top: 15px;
    }

    .expires-badge svg {
      width: 16px;
      height: 16px;
      fill: #e65100;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 1rem;
    }

    .new-upload-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: transparent;
      color: #667eea;
      border: 2px solid #667eea;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .new-upload-btn:hover {
      background: #667eea;
      color: white;
    }

    .footer {
      text-align: center;
      color: rgba(255,255,255,0.7);
      margin-top: 30px;
      font-size: 0.85rem;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #333;
      color: white;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 2rem;
      }

      .upload-area {
        padding: 30px 20px;
      }

      .qr-code img {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>FileShare</h1>
      <p>Share files via QR code - Auto-expires in 48 hours</p>
    </div>

    <div class="card">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        </div>
        <div class="upload-text">Click or drag file to upload</div>
        <div class="upload-hint">Maximum file size: 100MB</div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Uploading...</div>
      </div>

      <div class="result-area" id="resultArea">
        <div class="file-info">
          <div class="file-icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
          </div>
          <div class="file-details">
            <div class="file-name" id="fileName"></div>
            <div class="file-meta" id="fileMeta"></div>
          </div>
        </div>

        <div class="qr-section">
          <div class="qr-title">Scan to download</div>
          <div class="qr-code">
            <img id="qrCode" src="" alt="QR Code">
          </div>
          <div class="expires-badge">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <span>Expires in 48 hours</span>
          </div>
        </div>

        <a href="#" class="download-btn" id="downloadBtn">
          <svg style="width:20px;height:20px;vertical-align:middle;margin-right:8px;fill:white" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download File
        </a>

        <div class="copy-section">
          <button class="copy-btn" id="copyBtn">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            Copy Link
          </button>
        </div>

        <button class="new-upload-btn" id="newUploadBtn">Upload Another File</button>
      </div>
    </div>

    <div class="footer">
      Files are automatically deleted after 48 hours
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const resultArea = document.getElementById('resultArea');
    const fileName = document.getElementById('fileName');
    const fileMeta = document.getElementById('fileMeta');
    const qrCode = document.getElementById('qrCode');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const newUploadBtn = document.getElementById('newUploadBtn');
    const toast = document.getElementById('toast');

    let currentDownloadUrl = '';

    // Click to upload
    uploadArea.addEventListener('click', () => fileInput.click());

    // Drag and drop
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        uploadFile(files[0]);
      }
    });

    // File selected
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        uploadFile(fileInput.files[0]);
      }
    });

    // Upload file
    async function uploadFile(file) {
      uploadArea.style.display = 'none';
      loading.classList.add('active');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          showResult(data);
        } else {
          showToast('Upload failed: ' + data.error);
          resetUpload();
        }
      } catch (error) {
        showToast('Network error occurred');
        resetUpload();
      }
    }

    // Show result
    function showResult(data) {
      loading.classList.remove('active');
      resultArea.classList.add('active');

      fileName.textContent = data.originalName;
      fileMeta.textContent = `${data.size} • ${data.expiresIn}`;
      qrCode.src = data.qrCode;
      currentDownloadUrl = data.downloadUrl;
      downloadBtn.href = data.downloadUrl;
    }

    // Copy link
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(currentDownloadUrl);
        showToast('Link copied to clipboard!');
      } catch (error) {
        // Fallback
        const textArea = document.createElement('textarea');
        textArea.value = currentDownloadUrl;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast('Link copied to clipboard!');
      }
    });

    // New upload
    newUploadBtn.addEventListener('click', resetUpload);

    function resetUpload() {
      loading.classList.remove('active');
      resultArea.classList.remove('active');
      uploadArea.style.display = 'block';
      fileInput.value = '';
    }

    // Toast notification
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
